platform_name: "Cisco_C8500-12X4QC"

capabilities:
  supported_interface_types:
    - GigabitEthernet
    - TenGigabitEthernet
    - TwentyFiveGigE
    - FortyGigabitEthernet
    - HundredGigE
    - Port-channel
    - Loopback
    - Tunnel
    - Management
    - SVI

  supports_subinterfaces: true

  supports_trunking: true
  supports_etherchannel: true
  supports_spanning_tree: false

  supports_vrf: true
  supports_ospf: true
  supports_eigrp: true
  supports_bgp: true
  supports_ipv6: true

  supports_hsrp: true
  supports_vrrp: true
  supports_glbp: false

  supports_aaa: true
  supports_tacacs: true
  supports_radius: true
  supports_ssh: true
  supports_management_acl: true

  supports_snmp: true
  supports_syslog: true
  supports_ntp: true
  supports_nat: true
  supports_dhcp_server: true
  supports_ip_sla: true
  supports_object_tracking: true
  supports_flow_monitoring: true

  supports_qos: true

  supports_crypto: true
  supports_isakmp: true
  supports_ikev2: true
  supports_ipsec: true
  supports_tunnel_interfaces: true

scale:
  max_interfaces: 48
  max_physical_interfaces: 16
  max_access_ports: 0
  max_trunk_ports: 20
  max_l3_interfaces: 384
  max_port_channels: 24
  max_tunnels: 1500
  max_subinterfaces: 1500
  max_vrfs: 96
  max_bgp_neighbors: 800
  max_static_routes: 15000
  max_vlans: 512
  ports:
    # Cisco data sheet: 12× 1/10GE SFP+ + 2× 40GE QSFP+ + 2× 40/100GE QSFP28.
    # Each port encoded at its highest native speed; allocator handles upward
    # substitution. The 2× 40G QSFP+ slots support 4×10GE breakout, giving
    # up to 24×10GE total when not in SD-WAN mode.
    native:
      1G: 0
      10G: 12
      25G: 0
      40G: 2
      100G: 2
    breakout:
      10G_to_10x1G: 0
      40G_to_4x10G: 2
      100G_to_4x25G: 2
    reserved_or_dedicated:
      management: 1

constraints:
  intended_role: "wan_edge"

fit_preferences:
  role_alignment: "performance_wan_edge"
  role_weight: 9
  throughput_tier: "very_high"
  throughput_weight: 9
  services_weight: 9
  crypto_weight: 9
  routing_scale_weight: 9
  switching_bias: "low"
  branch_bias: "low"
  aggregation_bias: "high"

notes:
  - "Tuned planning profile for Cisco C8500-12X4QC."
  - "12× 1/10GE SFP+ + 2× 40GE QSFP+ + 2× 40/100GE QSFP28; up to 200 Gbps aggregate throughput."
  - "Strong fit for high-performance WAN edge with mixed uplink speeds."
  - "Often a good choice where interface speed mix matters more than absolute port density."